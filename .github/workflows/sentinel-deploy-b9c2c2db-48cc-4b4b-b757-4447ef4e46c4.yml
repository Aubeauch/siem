name: Deploy Content to azure-ad-b2c-logs [b9c2c2db-48cc-4b4b-b757-4447ef4e46c4]
# Note: This workflow will deploy everything in the root directory.
# To deploy content only from a specific path (for example SentinelContent):
#   1. Add the target path to the "paths" property like such
#    paths:
#    - 'SentinelContent/**'
#    - '!.github/workflows/**'
#    - '.github/workflows/sentinel-deploy-b9c2c2db-48cc-4b4b-b757-4447ef4e46c4.yml'
#   2. Append the path to the directory environment variable below
#       directory: '${{ github.workspace }}/SentinelContent'

on:
  push:
    branches: [ master ]
    paths:
    - '**'
    - '!.github/workflows/**'  # this filter prevents other workflow changes from triggering this workflow
    - '.github/workflows/sentinel-deploy-b9c2c2db-48cc-4b4b-b757-4447ef4e46c4.yml'

jobs:
  deploy-content:
    runs-on: windows-latest
    env:
      resourceGroupName: 'azure-ad-b2c-monitor'
      workspaceName: 'azure-ad-b2c-logs'
      workspaceId: 'b4166929-c307-49d2-a766-dd1d38984c5b'
      directory: '${{ github.workspace }}'
      cloudEnv: 'AzureCloud'
      contentTypes: 'AutomationRule,AnalyticsRule,HuntingQuery,Playbook,Parser,Workbook,Watchlist'
      branch: 'master'
      sourceControlId: 'b9c2c2db-48cc-4b4b-b757-4447ef4e46c4'
      rootDirectory: '${{ github.workspace }}'
      githubAuthToken: ${{ secrets.GITHUB_TOKEN }}
      smartDeployment: 'true'
    permissions:
      contents: write
      id-token: write # Require write permission to Fetch an OIDC token.

    steps:
    - name: Login to Azure (Attempt 1)
      continue-on-error: true
      id: login1
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_SENTINEL_CLIENTID_b9c2c2db48cc4b4bb7574447ef4e46c4 }}
        tenant-id: ${{ secrets.AZURE_SENTINEL_TENANTID_b9c2c2db48cc4b4bb7574447ef4e46c4 }}
        subscription-id: ${{ secrets.AZURE_SENTINEL_SUBSCRIPTIONID_b9c2c2db48cc4b4bb7574447ef4e46c4 }}
        environment: 'AzureCloud'
        audience: api://AzureADTokenExchange
        enable-AzPSSession: true

    - name: Wait 30 seconds if login attempt 1 failed
      if: ${{ steps.login1.outcome=='failure' }}
      run: powershell Start-Sleep -s 30

    - name: Login to Azure (Attempt 2)
      continue-on-error: true
      id: login2
      uses: azure/login@v2
      if: ${{ steps.login1.outcome=='failure' }}
      with:
        client-id: ${{ secrets.AZURE_SENTINEL_CLIENTID_b9c2c2db48cc4b4bb7574447ef4e46c4 }}
        tenant-id: ${{ secrets.AZURE_SENTINEL_TENANTID_b9c2c2db48cc4b4bb7574447ef4e46c4 }}
        subscription-id: ${{ secrets.AZURE_SENTINEL_SUBSCRIPTIONID_b9c2c2db48cc4b4bb7574447ef4e46c4 }}
        environment: 'AzureCloud'
        audience: api://AzureADTokenExchange
        enable-AzPSSession: true

    - name: Wait 30 seconds if login attempt 2 failed
      if: ${{ steps.login2.outcome=='failure' }}
      run: powershell Start-Sleep -s 30

    - name: Login to Azure (Attempt 3)
      continue-on-error: false
      id: login3
      uses: azure/login@v2
      if: ${{ steps.login2.outcome=='failure'  }}
      with:
        client-id: ${{ secrets.AZURE_SENTINEL_CLIENTID_b9c2c2db48cc4b4bb7574447ef4e46c4 }}
        tenant-id: ${{ secrets.AZURE_SENTINEL_TENANTID_b9c2c2db48cc4b4bb7574447ef4e46c4 }}
        subscription-id: ${{ secrets.AZURE_SENTINEL_SUBSCRIPTIONID_b9c2c2db48cc4b4bb7574447ef4e46c4 }}
        environment: 'AzureCloud'
        audience: api://AzureADTokenExchange
        enable-AzPSSession: true

    - name: Checkout
      uses: actions/checkout@v3

    - name: Deploy Content to Microsoft Sentinel
      uses: azure/powershell@v2
      with:
        azPSVersion: 'latest'
        inlineScript: |
          ${{ github.workspace }}//.github/workflows/azure-sentinel-deploy-b9c2c2db-48cc-4b4b-b757-4447ef4e46c4.ps1